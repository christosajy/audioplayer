<!DOCTYPE html>

{% extends 'index.html' %}
{% block content %}

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <div class="row">
        <div class="col-md-12 grid-margin stretch-card">
            <div class="card">
                <div class="card-body">
                    <h4 class="card-title">Edit Sub Genre</h4>

                    <form class="forms-sample" action="{% url 'UpdateSubGenre' subId=subgen.id %}" method="POST"
                        enctype="multipart/form-data">
                        {% csrf_token %}

                        <div class="form-group">
                            <label>Edit Sub-Genre Name</label>
                            <input type="text" class="form-control" value="{{subgen.Sub_Genre_Name}}" placeholder="Genre Name" name="SubGenName">
                        </div>

                        <div class="form-group">
                            <label>Edit Selected Respective Genre</label>
                            <select name="SubResGen" class="form-control">
                                <option value="{{subgen.Res_Sub_Genre}}">{{subgen.Res_Sub_Genre}}</option>
                                {% for i in genre %}
                                <option value="{{i.Genre_Name}}">{{i.Genre_Name}}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="form-group">
                            <button type="submit" class="btn btn-primary mr-2"><span>Submit</span></button>
                            <button class="btn btn-dark"><span>Cancel</span></button>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </div>
</body>

</html>
{% endblock %}
