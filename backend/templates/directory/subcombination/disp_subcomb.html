<!DOCTYPE html>
{% extends 'index.html' %}
{% block content %}
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <div class="card mb-1">
        <div class="card-body">
            <form action="" method="GET" class="forms-sample">
                <div class="form-group mb-0">
                    <button type="submit" class="btn btn-primary">
                        <i class="fa-solid fa-magnifying-glass mr-2"></i><span>Search</span>
                    </button>
                    <input type="text" name="keyword" class="form-control display-search-box" autocomplete="off"
                        placeholder="Type your keyword ...">
                </div>
            </form>
        </div>
    </div>
    <div class="card">
        <div class="card-body">
            <h4 class="card-title">Display Genre-Sub Genre Combination</h4>

            <div class="table-responsive">
                <table class="table table-striped">
                    <thead>
                        <tr>
                            <th>Genre</th>
                            <th>Sub Genre</th>
                            <th>Image File</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for i in subcom %}
                        <tr>
                            <td>{{i.Sub_Com_Genre}}</td>
                            <td>{{i.Sub_Com_Res_SubGenre}}</td>
                            <td>
                                <img src="{{i.Sub_Com_Img_File.url}}" alt="Image">
                            </td>
                            <td>
                                <form action="{% url 'EditSubCombination' subId=i.id %}">
                                    <button type="submit" class="btn btn-success">
                                        <span>Edit</span>
                                    </button>
                                </form>
                            </td>
                            <td>
                                <form action="{% url 'DeleteSubCombination' subId=i.id %}">
                                    <button type="submit" class="btn btn-danger">
                                        <span>Delete</span>
                                    </button>
                                </form>
                            </td>
                        </tr>

                        {% empty %}
                        <span class="text-danger">No Records Found</span>
                        
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</body>

</html>
{% endblock %}
