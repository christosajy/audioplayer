<!DOCTYPE html>

{% extends 'index.html' %}
{% block content %}

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <div class="col-12 grid-margin stretch-card">
        <div class="card">
            <div class="card-body">
                <h4 class="card-title">Add Genre</h4>
                
                <form class="forms-sample" action="{% url 'save_genre' %}" method="POST" enctype="multipart/form-data">
                    {% csrf_token %}

                    <div class="form-group">
                        <label>Genre Name</label>
                        <input type="text" class="form-control" placeholder="Genre Name" name="genName">
                    </div>

                    <div class="form-group">
                        <label>Genre Subtitle</label>
                        <input type="text" class="form-control" placeholder="Genre Subtitle" name="genSbtl">
                    </div>

                    <div class="form-group">
                        <button type="submit" class="btn btn-primary mr-2"><span>Submit</span></button>
                        <button class="btn btn-dark"><span>Cancel</span></button>
                    </div>
                </form>

            </div>
        </div>
    </div>
</body>

</html>
{% endblock %}
