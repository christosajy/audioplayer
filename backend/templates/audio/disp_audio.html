<!DOCTYPE html>
{% extends 'index.html' %}
{% block content %}
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <div class="card">
        <div class="card-body">
            <h4 class="card-title">Display Language</h4>

            <div class="table-responsive">
                <table class="table table-striped">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Language</th>
                            <th>Genre</th>
                            <th>Year</th>
                            <th>Artists</th>
                            <th>Album/Film</th>
                            <th>Audio File</th>
                            <th>Image</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for i in audio %}
                        <tr>
                            <td>{{i.Name}}</td>
                            <td>{{i.Language}}</td>
                            <td>{{i.Genre}}</td>
                            <td>{{i.Year}}</td>
                            <td>{{i.Artists}}</td>
                            <td>{{i.Album_or_Film}}</td>
                            <td>
                                <audio controls controlslist="nodownload">
                                    <source src="{{i.Audio_File.url}}" type="audio/mp3">
                                </audio>
                            </td>
                            <td>
                                <img src="{{i.Img_File.url}}" alt="Image">
                            </td>
                            <td>
                                <form action="{% url 'editaudio' audioId=i.id %}">
                                    <button type="submit" class="btn btn-success">
                                        <span>Edit</span>
                                    </button>
                                </form>
                            </td>
                            <td>
                                <form action="{% url 'audiodelete' audioId=i.id %}">
                                    <button type="submit" class="btn btn-danger">
                                        <span>Delete</span>
                                    </button>
                                </form>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>

</html>
{% endblock %}
