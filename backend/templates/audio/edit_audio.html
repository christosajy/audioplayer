<!DOCTYPE html>

{% extends 'index.html' %}
{% block content %}

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <div class="col-12 grid-margin stretch-card">
        <div class="card">
            <div class="card-body">
                <h4 class="card-title">Add Audio Files</h4>

                <form class="forms-sample" action="{% url 'saveaudio' %}" method="POST" enctype="multipart/form-data">
                    {% csrf_token %}

                    <div class="form-group">
                        <label>Audio Name</label>
                        <input type="text" class="form-control" value="{{audio.Name}}" placeholder="Audio name"
                            name="audioname">
                    </div>

                    <div class="form-group">
                        <label>Audio Genre</label>
                        <select name="audiogenre" class="form-control">
                            <option value="{{audio.Genre}}">{{audio.Genre}}</option>
                            {% for i in genre %}
                            <option value="{{i.Genre_Name}}">{{i.Genre_Name}}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Audio Language</label>
                        <select name="audiolanguage" class="form-control">
                            <option value="{{audio.Language}}">{{audio.Language}}</option>
                            {% for i in lang %}
                            <option value="{{i.Language_Name}}">{{i.Language_Name}}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Audio File</label>
                        <input type="file" class="form-control" name="audiofile">
                        <audio src="{{audio.Audio_File.url}}" controls class="mt-3"></audio>
                        <p class="edit-audio-value">/{{audio.Audio_File}}</p>
                    </div>

                    <div class="form-group edit-audio-btn">
                        <button type="submit" class="btn btn-primary mr-2">
                            <span>Submit</span>
                        </button>

                        <button class="btn btn-dark">
                            <span>Cancel</span>
                        </button>
                    </div>

                </form>

            </div>
        </div>
    </div>
</body>

</html>
{% endblock %}
